log_format security '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

access_log off;
error_log /var/log/nginx/error.log warn;

upstream frontend_app {
    server frontend-app:80;
}

upstream lab_api {
    server lab-api:4000;
}

server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    access_log /var/log/nginx/access.log security;

    # Intentionally weak for demonstration:
    # HTTP only, no TLS, no security headers, and no sensitive path blocking.
    server_tokens on;

    location /api/lab/ {
        proxy_pass http://lab_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
