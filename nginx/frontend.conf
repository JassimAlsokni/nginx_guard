server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;

    root /usr/share/nginx/html;
    index index.html;

    location = /search {
        default_type text/html;
        return 200 '<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Lab Search Results</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; color: #172033; background: #f8fafc; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { margin: 0 0 16px; color: #526070; }
      .notice { padding: 12px; border: 1px solid #f59e0b; background: #fffbeb; border-radius: 8px; margin-bottom: 16px; }
      table { border-collapse: collapse; width: 100%; background: white; border: 1px solid #d9e2ec; }
      th, td { text-align: left; padding: 10px; border-bottom: 1px solid #e5edf5; font-size: 14px; }
      th { background: #edf2f7; }
      code { background: #edf2f7; padding: 2px 4px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>Search Results - Secure Proxy Lab</h1>
    <p>This is harmless training data returned by the internal app. It is not a real database dump.</p>
    <div class="notice">
      SQL-style text in the query, such as <code>UNION SELECT</code>, should be investigated in Nginx access logs.
      A <code>200</code> response means the request reached the app; it does not prove compromise.
    </div>
    <table>
      <thead>
        <tr><th>Record</th><th>Type</th><th>Lab Meaning</th></tr>
      </thead>
      <tbody>
        <tr><td>training-user-001</td><td>Mock account</td><td>Used to show what returned app data looks like.</td></tr>
        <tr><td>training-event-017</td><td>Security signal</td><td>Suspicious query is visible in access.log.</td></tr>
        <tr><td>training-alert-042</td><td>Investigation item</td><td>Review status code, path, user-agent, and timestamp.</td></tr>
      </tbody>
    </table>
  </body>
</html>';
    }

    location = /login {
        default_type text/html;
        return 200 '<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Lab Login Endpoint</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 24px; color: #172033; background: #f8fafc; }
      .box { max-width: 520px; padding: 16px; border: 1px solid #d9e2ec; border-radius: 8px; background: white; }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Login Lab Endpoint</h1>
      <p>This endpoint exists so repeated POST /login requests can be logged and analyzed.</p>
      <p>No real login or password checking happens here.</p>
    </div>
  </body>
</html>';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
