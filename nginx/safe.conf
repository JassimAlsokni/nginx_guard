log_format security '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent" '
                    'rt=$request_time urt=$upstream_response_time';

access_log off;
error_log /var/log/nginx/error.log warn;

upstream frontend_app {
    server frontend-app:80;
}

upstream lab_api {
    server lab-api:4000;
}

server {
    listen 80 default_server;
    server_name localhost 127.0.0.1 _;
    access_log /var/log/nginx/access.log security;

    server_tokens off;
    return 301 https://$host:8443$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name localhost 127.0.0.1 _;
    access_log /var/log/nginx/access.log security;

    server_tokens off;

    ssl_certificate /etc/nginx/ssl/localhost.crt;
    ssl_certificate_key /etc/nginx/ssl/localhost.key;
    ssl_protocols TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;

    location ~* (^/\.(env|git)(/|$)|\.(sql|bak|zip)$|^/(backup|config)|^/etc/passwd$|\.\./|\.\.%2f|%2e%2e) {
        return 403;
    }

    location /api/lab/ {
        proxy_pass http://lab_api;
        proxy_http_version 1.1;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_app;
        proxy_http_version 1.1;
        proxy_hide_header X-Powered-By;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
